name: Test Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - ready_for_review
  workflow_dispatch:

jobs:
  build-and-test-bun:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    strategy:
      matrix:
        node-version: [20.8, 22.13, 24.14]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.6
      - name: Run Bun install
        run: bun install
      - name: Type Check
        run: bun types
      - name: Build
        run: bun --bun run build

  build-and-test-node-pnpm:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    strategy:
      matrix:
        node-version: [20.8, 22.13, 24.14]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: pnpm/action-setup@v6.0.8
        name: Install pnpm
        id: pnpm-install
        with:
          version: 11
      - name: Run pnpm install
        run: pnpm install
      - name: Type Check
        run: pnpm types
      - name: Build
        run: pnpm build

  integration-tests:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    needs: build-and-test-node-pnpm
    concurrency:
      group: test-suite.staging
    env:
      NODE_VERSION: 24.14
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v6.0.8
        name: Install pnpm
        id: pnpm-install
        with:
          version: 11
      - name: Run pnpm install
        run: pnpm install
      - name: Run integration tests
        env:
          DATANEST_API_BASE_URL: ${{ secrets.DATANEST_API_BASE_URL }}
          DATANEST_API_KEY: ${{ secrets.DATANEST_API_KEY }}
          DATANEST_API_SECRET: ${{ secrets.DATANEST_API_SECRET }}
          ENVIRO_PROJECT_UUID: ${{ secrets.ENVIRO_PROJECT_UUID }}
        run: pnpm test

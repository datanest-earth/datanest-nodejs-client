name: Test Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-type-check:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.6
      - name: Run Bun install
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Type Check
        run: bun run types
      - name: Build
        run: bun run build

  smoke-test-node-smoke-tests:
    runs-on: ubuntu-latest
    needs: build-and-type-check
    if: ${{ !github.event.pull_request.draft }}

    strategy:
      matrix:
        node-version: [20.8, 22.13, 24.14]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.6
      - name: Run Bun install
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Build
        run: bun run build
      - name: Smoke test
        run: node tests/smoke.js

  integration-tests:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    needs: smoke-test-node-smoke-tests
    concurrency:
      group: test-suite.staging
    env:
      NODE_VERSION: 24.14
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.6
      - name: Run Bun install
        run: bun install
      - name: Run integration tests
        env:
          DATANEST_API_BASE_URL: ${{ secrets.DATANEST_API_BASE_URL }}
          DATANEST_API_KEY: ${{ secrets.DATANEST_API_KEY }}
          DATANEST_API_SECRET: ${{ secrets.DATANEST_API_SECRET }}
          ENVIRO_PROJECT_UUID: ${{ secrets.ENVIRO_PROJECT_UUID }}
          PROD: '1'
        run: bun test --timeout 30000
